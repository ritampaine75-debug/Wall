<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>WallHub | Minimal Wallpapers</title>
    <meta name="title" content="WallHub | Minimal Wallpapers">
    <meta name="description" content="Explore and download high-quality minimal wallpapers. Clean, simple, and elegant designs for your devices.">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://ritampaine75-debug.github.io/wall/"> 
    <meta property="og:title" content="WallHub | Minimal Wallpapers">
    <meta property="og:description" content="Download high-quality minimal wallpapers for your mobile and desktop.">
    <meta property="og:image" content="https://i.ibb.co/67Jdp8PX/1775444245405.png">

    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://ritampaine75-debug.github.io/wall/">
    <meta property="twitter:title" content="WallHub | Minimal Wallpapers">
    <meta property="twitter:description" content="Explore and download high-quality minimal wallpapers.">
    <meta property="twitter:image" content="https://i.ibb.co/67Jdp8PX/1775444245405.png">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #050505;
            --surface: #121212;
            --primary: #7047eb;
            --text: #ffffff;
            --text-secondary: #888888;
            --border: rgba(255, 255, 255, 0.05);
            --radius: 20px;
        }

        [data-theme="light"] {
            --bg: #ffffff;
            --surface: #f5f5f7;
            --primary: #5c36cc;
            --text: #1d1d1f;
            --text-secondary: #6e6e73;
            --border: rgba(0, 0, 0, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            transition: background 0.3s ease;
        }

        /* --- HEADER --- */
        header {
            position: fixed;
            top: 0; left: 0; width: 100%;
            z-index: 1000;
            padding: 20px 5%;
            background: rgba(var(--bg), 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-size: 1.3rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--primary), #b097ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-actions { display: flex; gap: 12px; }

        .icon-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            width: 40px; height: 40px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s;
        }

        /* --- GALLERY --- */
        .container { 
            padding: 100px 4% 40px 4%; 
            max-width: 1400px; 
            margin: 0 auto; 
        }

        .gallery {
            columns: 2;
            column-gap: 15px;
        }

        .card {
            break-inside: avoid;
            margin-bottom: 15px;
            border-radius: var(--radius);
            overflow: hidden;
            position: relative;
            background: var(--surface);
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card:hover { transform: scale(1.02); }

        .card img {
            width: 100%; height: auto;
            display: block;
        }

        /* Favorite Button on Card */
        .fav-toggle {
            position: absolute;
            top: 12px; right: 12px;
            width: 34px; height: 34px;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white;
            border: none;
            cursor: pointer;
            z-index: 2;
            opacity: 0;
            transition: 0.3s;
        }
        .card:hover .fav-toggle { opacity: 1; }
        .fav-toggle.active { color: #ff4757; opacity: 1; background: white; }

        /* --- MODAL --- */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal.active { display: flex; }

        .modal-img {
            max-width: 100%;
            max-height: 75vh;
            border-radius: 15px;
            object-fit: contain;
        }

        .modal-actions {
            margin-top: 25px;
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .info-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            color: #ccc;
            font-size: 0.85rem;
            margin-bottom: 5px;
        }

        .btn-group { display: flex; gap: 10px; }

        .btn {
            flex: 1;
            padding: 16px;
            border-radius: 15px;
            border: none;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: 0.2s;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: #333; color: white; }

        .close-modal {
            position: absolute;
            top: 25px; right: 25px;
            color: white; font-size: 1.5rem;
            cursor: pointer;
        }

        /* --- SKELETON --- */
        .skeleton {
            height: 250px;
            background: var(--surface);
            border-radius: var(--radius);
            margin-bottom: 15px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* --- MOBILE OPTIMIZATION --- */
        @media (min-width: 768px) {
            .gallery { columns: 3; column-gap: 20px; }
            .container { padding-top: 120px; }
        }
        @media (min-width: 1200px) {
            .gallery { columns: 4; }
        }
        @media (max-width: 600px) {
            .fav-toggle { opacity: 1; }
            .modal-actions { position: fixed; bottom: 0; background: var(--surface); padding: 25px; border-radius: 25px 25px 0 0; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">WALLHUB</div>
        <div class="nav-actions">
            <button class="icon-btn" id="themeToggle"><i class="fas fa-moon"></i></button>
            <button class="icon-btn" id="showFavs"><i class="fas fa-heart"></i></button>
        </div>
    </header>

    <div class="container">
        <div class="gallery" id="gallery">
            <div class="skeleton"></div>
            <div class="skeleton"></div>
            <div class="skeleton"></div>
            <div class="skeleton"></div>
        </div>
    </div>

    <div class="modal" id="imageModal">
        <span class="close-modal"><i class="fas fa-times"></i></span>
        <img src="" class="modal-img" id="modalImg">
        
        <div class="modal-actions">
            <div class="info-row">
                <span id="resTag"><i class="fas fa-expand"></i> --</span>
                <span><i class="fas fa-check-circle"></i> High Quality</span>
            </div>
            <div class="btn-group">
                <button class="btn btn-secondary" id="shareBtn"><i class="fas fa-share"></i> Share</button>
                <button class="btn btn-primary" id="dlBtn"><i class="fas fa-download"></i> Download</button>
            </div>
        </div>
    </div>

    <script>
        const USERNAME = "ritampaine75-debug";
        const REPO = "wall";
        const FOLDER = "wallpapers";

        let wallpapers = [];
        let favorites = JSON.parse(localStorage.getItem('my_favs')) || [];
        let viewingFavorites = false;

        const gallery = document.getElementById('gallery');
        const modal = document.getElementById('imageModal');

        async function init() {
            try {
                const res = await fetch(`https://api.github.com/repos/${USERNAME}/${REPO}/contents/${FOLDER}`);
                const data = await res.json();
                
                wallpapers = data
                    .filter(f => f.name.match(/\.(jpg|jpeg|png|webp)$/i))
                    .map(f => f.download_url);

                render(wallpapers);
            } catch (err) {
                gallery.innerHTML = "<p>Error connecting to gallery.</p>";
            }
        }

        function render(list) {
            gallery.innerHTML = list.map(url => `
                <div class="card" onclick="openModal('${url}')">
                    <button class="fav-toggle ${favorites.includes(url) ? 'active' : ''}" 
                            onclick="event.stopPropagation(); toggleFav('${url}', this)">
                        <i class="fas fa-heart"></i>
                    </button>
                    <img src="${url}" loading="lazy">
                </div>
            `).join('');
        }

        function toggleFav(url, btn) {
            if (favorites.includes(url)) {
                favorites = favorites.filter(f => f !== url);
                btn.classList.remove('active');
            } else {
                favorites.push(url);
                btn.classList.add('active');
            }
            localStorage.setItem('my_favs', JSON.stringify(favorites));
        }

        document.getElementById('showFavs').onclick = function() {
            viewingFavorites = !viewingFavorites;
            this.style.color = viewingFavorites ? '#ff4757' : 'inherit';
            render(viewingFavorites ? wallpapers.filter(w => favorites.includes(w)) : wallpapers);
        };

        function openModal(url) {
            const img = document.getElementById('modalImg');
            img.src = url;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';

            const i = new Image();
            i.src = url;
            i.onload = () => document.getElementById('resTag').innerHTML = `<i class="fas fa-expand"></i> ${i.naturalWidth} x ${i.naturalHeight}`;

            document.getElementById('dlBtn').onclick = () => download(url);
            document.getElementById('shareBtn').onclick = () => share(url);
        }

        async function download(url) {
            const btn = document.getElementById('dlBtn');
            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i>`;
            try {
                const res = await fetch(url);
                const blob = await res.blob();
                const bUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = bUrl;
                a.download = "wallpaper.jpg";
                a.click();
            } catch(e) { window.open(url, '_blank'); }
            btn.innerHTML = `<i class="fas fa-download"></i> Download`;
        }

        function share(url) {
            if (navigator.share) {
                navigator.share({ url: url });
            } else {
                navigator.clipboard.writeText(url);
                alert("Link copied!");
            }
        }

        document.querySelector('.close-modal').onclick = () => {
            modal.classList.remove('active');
            document.body.style.overflow = 'auto';
        };

        document.getElementById('themeToggle').onclick = () => {
            const isDark = document.body.getAttribute('data-theme') !== 'light';
            document.body.setAttribute('data-theme', isDark ? 'light' : 'dark');
            document.getElementById('themeToggle').innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
        };

        init();
    </script>
</body>
</html>
